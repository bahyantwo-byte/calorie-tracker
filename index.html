<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chowvy's Kcal">
<meta name="theme-color" content="#12080f">
<title>Chowvy's Kcal ✿</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      oklch(9%  0.025 350);
  --bg2:     oklch(13% 0.03  350);
  --bg3:     oklch(17% 0.035 350);
  --border:  oklch(24% 0.04  350);
  --rose:    oklch(75% 0.18  355);
  --rose2:   oklch(83% 0.16  355);
  --rosed:   oklch(75% 0.18  355 / 0.14);
  --lavender: oklch(72% 0.12 300);
  --text:    oklch(96% 0.008 355);
  --dim:     oklch(55% 0.02  355);
  --red:     oklch(62% 0.22  25);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100dvh;
  overflow: hidden;
  user-select: none;
}

/* subtle background texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 20% 0%, oklch(75% 0.18 355 / 0.07) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, oklch(72% 0.12 300 / 0.06) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.app {
  display: flex; flex-direction: column;
  height: 100dvh;
  padding-top: var(--safe-top);
  position: relative; z-index: 1;
}

/* ── TAB BAR ── */
.tabbar {
  display: flex; background: var(--bg2);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom); flex-shrink: 0;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 10px 0 8px;
  font-size: 0.67rem; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s;
}
.tab svg { width: 21px; height: 21px; stroke-width: 1.8; }
.tab.active { color: var(--rose); }

/* ── SCREENS ── */
.screen { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; }
.screen.active { display: flex; flex-direction: column; }

/* ── TODAY SCREEN ── */
.today-top { padding: 24px 22px 18px; flex-shrink: 0; }

.greeting {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem; font-weight: 500;
  letter-spacing: -0.01em; margin-bottom: 2px;
  color: var(--text);
}
.greeting span { color: var(--rose); font-style: italic; }

.today-date {
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 18px;
}

/* Ring + total */
.total-row {
  display: flex; align-items: center; gap: 20px; margin-bottom: 18px;
}
.ring-wrap { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.ring-wrap svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
.ring-fill {
  fill: none; stroke: var(--rose); stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 220;
  stroke-dashoffset: 220;
  transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1);
}
.ring-fill.over { stroke: var(--red); }
.ring-num {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem; font-weight: 500; color: var(--rose); line-height: 1;
}

.total-info { flex: 1; }
.total-num {
  font-family: 'DM Mono', monospace;
  font-size: 3.2rem; font-weight: 500; line-height: 1;
  letter-spacing: -0.03em; color: var(--text);
}
.total-sub { font-size: 0.75rem; color: var(--dim); margin-top: 4px; font-weight: 500; }
.total-remain {
  font-size: 0.78rem; color: var(--rose); font-weight: 600; margin-top: 2px;
}

/* ── MEALS ── */
.meals-section { padding: 0 14px 130px; flex: 1; }
.section-label {
  font-size: 0.67rem; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--dim); padding: 4px 6px 12px;
}

.meal-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg2); border-radius: 16px;
  padding: 14px; margin-bottom: 9px;
  border: 1px solid var(--border);
  animation: fadeUp .22s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.meal-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: var(--rosed); display: flex; align-items: center;
  justify-content: center; font-size: 1.15rem; flex-shrink: 0;
}
.meal-info { flex: 1; min-width: 0; }
.meal-name {
  font-size: 0.92rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meal-time { font-size: 0.7rem; color: var(--dim); margin-top: 2px; }
.meal-cals {
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem; font-weight: 500; color: var(--rose); flex-shrink: 0;
}
.meal-del {
  width: 26px; height: 26px; border-radius: 50%;
  background: oklch(62% 0.22 25 / 0.1); border: none;
  color: oklch(62% 0.22 25 / 0.6); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .15s;
}
.meal-del:active { background: oklch(62% 0.22 25 / 0.25); color: var(--red); }

.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 50px 24px;
  color: var(--dim); text-align: center; gap: 12px;
}
.empty-flower { font-size: 2.5rem; opacity: 0.4; }
.empty-state p { font-size: 0.83rem; line-height: 1.6; }

/* ── ADD BUTTON ── */
.add-btn {
  position: fixed;
  bottom: calc(64px + var(--safe-bottom) + 14px);
  left: 14px; right: 14px;
  height: 58px; border-radius: 18px;
  background: linear-gradient(135deg, oklch(75% 0.18 355), oklch(70% 0.15 330));
  color: white;
  font-family: 'DM Sans', sans-serif; font-size: 0.97rem; font-weight: 700;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .15s, opacity .15s;
  box-shadow: 0 8px 28px oklch(75% 0.18 355 / 0.35);
  letter-spacing: 0.01em;
}
.add-btn:active { transform: scale(0.97); opacity: 0.9; }

/* ── HISTORY ── */
.history-header { padding: 28px 22px 16px; flex-shrink: 0; }
.history-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem; font-weight: 500; letter-spacing: -0.01em;
}
.history-list { padding: 0 14px 32px; }

.history-day {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; margin-bottom: 10px; overflow: hidden;
}
.history-day-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 15px 16px; cursor: pointer;
}
.history-day-date { font-size: 0.85rem; font-weight: 600; }
.history-day-right { display: flex; align-items: center; gap: 10px; }
.history-day-total {
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem; font-weight: 500; color: var(--rose);
}
.chevron { color: var(--dim); font-size: 0.75rem; transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }
.history-meals { border-top: 1px solid var(--border); display: none; }
.history-meals.open { display: block; }
.history-meal-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  font-size: 0.83rem;
}
.history-meal-row:last-child { border-bottom: none; }
.history-meal-cal { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--dim); }
.no-history { text-align: center; padding: 60px 24px; color: var(--dim); font-size: 0.85rem; }

/* ── SHEET ── */
.sheet-overlay {
  position: fixed; inset: 0;
  background: oklch(0% 0 0 / 0.75);
  z-index: 100; display: none; align-items: flex-end;
  backdrop-filter: blur(6px);
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--bg2); border-radius: 28px 28px 0 0;
  padding: 0 20px calc(24px + var(--safe-bottom));
  width: 100%; border-top: 1px solid var(--border);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.32,0,.67,0);
}
.sheet-overlay.open .sheet {
  transform: translateY(0);
  transition: transform .35s cubic-bezier(.33,1,.68,1);
}
.sheet-handle {
  width: 32px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 13px auto 18px;
}
.sheet-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem; font-weight: 500; margin-bottom: 18px;
  color: var(--text); font-style: italic;
}
.input-group { margin-bottom: 13px; }
.input-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 7px; display: block;
}
.input-field {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 16px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.97rem; font-weight: 500; outline: none;
  transition: border-color .2s; -webkit-appearance: none;
}
.input-field:focus { border-color: var(--rose); }
.input-field::placeholder { color: var(--dim); }

.quick-cals { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.quick-btn {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 14px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600;
  color: var(--dim); cursor: pointer; transition: all .15s;
}
.quick-btn:active { background: var(--rosed); border-color: var(--rose); color: var(--rose); }

.emoji-row {
  display: flex; gap: 7px; margin-bottom: 15px;
  overflow-x: auto; scrollbar-width: none; padding-bottom: 2px;
}
.emoji-row::-webkit-scrollbar { display: none; }
.emoji-opt {
  width: 42px; height: 42px; border-radius: 11px;
  background: var(--bg3); border: 2px solid transparent;
  font-size: 1.15rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: border-color .15s;
}
.emoji-opt.selected { border-color: var(--rose); background: var(--rosed); }

.sheet-add-btn {
  width: 100%; height: 54px; border-radius: 16px;
  background: linear-gradient(135deg, oklch(75% 0.18 355), oklch(70% 0.15 330));
  color: white;
  font-family: 'DM Sans', sans-serif; font-size: 0.97rem; font-weight: 700;
  border: none; cursor: pointer; margin-top: 4px;
  transition: transform .15s, opacity .15s;
}
.sheet-add-btn:active { transform: scale(0.97); opacity: 0.9; }
</style>
</head>
<body>

<div class="app">

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="today-top">
      <div class="greeting">Hey, <span id="greeting-name">Chowvy</span> ✿</div>
      <div class="today-date" id="today-date"></div>

      <div class="total-row">
        <div class="ring-wrap">
          <svg viewBox="0 0 80 80">
            <circle class="ring-bg" cx="40" cy="40" r="34"/>
            <circle class="ring-fill" id="ring-fill" cx="40" cy="40" r="34"/>
          </svg>
          <div class="ring-num">
            <div class="ring-pct" id="ring-pct">0%</div>
          </div>
        </div>
        <div class="total-info">
          <div class="total-num" id="total-num">0</div>
          <div class="total-sub">calories today</div>
          <div class="total-remain" id="total-remain"></div>
        </div>
      </div>
    </div>

    <div class="meals-section">
      <div class="section-label">Today's Meals</div>
      <div id="meals-list"></div>
    </div>

    <button class="add-btn" onclick="openSheet()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18"><path d="M12 5v14M5 12h14"/></svg>
      Log a Meal
    </button>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="history-header">
      <h2>History ✦</h2>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- TABS -->
  <div class="tabbar">
    <div class="tab active" id="tab-today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      Today
    </div>
    <div class="tab" id="tab-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      History
    </div>
  </div>
</div>

<!-- SHEET -->
<div class="sheet-overlay" id="sheet" onclick="handleOverlayClick(event)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">What did you eat? ✿</div>

    <div class="emoji-row" id="emoji-row"></div>

    <div class="input-group">
      <label class="input-label">Meal Name</label>
      <input class="input-field" id="meal-name" type="text" placeholder="e.g. Salad, Rice Bowl..." autocomplete="off" autocorrect="off">
    </div>

    <div class="input-group">
      <label class="input-label">Calories</label>
      <input class="input-field" id="meal-cals" type="number" placeholder="e.g. 350" inputmode="numeric">
    </div>

    <div class="quick-cals">
      <button class="quick-btn" onclick="setCals(100)">100</button>
      <button class="quick-btn" onclick="setCals(200)">200</button>
      <button class="quick-btn" onclick="setCals(350)">350</button>
      <button class="quick-btn" onclick="setCals(500)">500</button>
      <button class="quick-btn" onclick="setCals(700)">700</button>
    </div>

    <button class="sheet-add-btn" onclick="addMeal()">Add ✓</button>
  </div>
</div>

<script>
const GOAL = 2000;
const EMOJIS = ['🥗','🍗','🍎','🥑','🍜','🍳','🥪','🍚','🍕','🥤','🍫','🥐','🌮','🍱','🫐','🍦'];
let selectedEmoji = EMOJIS[0];

function todayKey() { return new Date().toISOString().slice(0, 10); }
function getAllData() { return JSON.parse(localStorage.getItem('chowvy_kcal') || '{}'); }
function saveData(d) { localStorage.setItem('chowvy_kcal', JSON.stringify(d)); }
function getTodayMeals() { return getAllData()[todayKey()] || []; }

function saveMeal(meal) {
  const data = getAllData();
  const key = todayKey();
  if (!data[key]) data[key] = [];
  data[key].push(meal);
  saveData(data);
}

function deleteMeal(id) {
  const data = getAllData();
  const key = todayKey();
  data[key] = (data[key] || []).filter(m => m.id !== id);
  if (data[key].length === 0) delete data[key];
  saveData(data);
}

function renderToday() {
  const meals = getTodayMeals();
  const total = meals.reduce((s, m) => s + m.calories, 0);

  // Date + greeting
  const d = new Date();
  const h = d.getHours();
  const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting-name').closest('.greeting').innerHTML =
    `${greet}, <span style="color:var(--rose);font-style:italic">Chowvy</span> ✿`;
  document.getElementById('today-date').textContent = d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

  // Numbers
  document.getElementById('total-num').textContent = total.toLocaleString();
  const remaining = GOAL - total;
  document.getElementById('total-remain').textContent = remaining >= 0
    ? `${remaining.toLocaleString()} kcal remaining`
    : `${Math.abs(remaining).toLocaleString()} kcal over goal`;

  // Ring
  const pct = Math.min(total / GOAL, 1);
  const circumference = 2 * Math.PI * 34;
  const offset = circumference * (1 - pct);
  const ring = document.getElementById('ring-fill');
  ring.style.strokeDasharray = circumference;
  ring.style.strokeDashoffset = offset;
  ring.classList.toggle('over', total > GOAL);
  document.getElementById('ring-pct').textContent = Math.round(pct * 100) + '%';

  // Meals
  const list = document.getElementById('meals-list');
  if (!meals.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-flower">✿</div>
      <p>Nothing logged yet today.<br>Tap <strong>Log a Meal</strong> to start!</p>
    </div>`;
    return;
  }
  list.innerHTML = meals.map(m => `
    <div class="meal-item">
      <div class="meal-icon">${m.emoji || '🍽️'}</div>
      <div class="meal-info">
        <div class="meal-name">${m.name}</div>
        <div class="meal-time">${m.time}</div>
      </div>
      <div class="meal-cals">${m.calories.toLocaleString()}</div>
      <button class="meal-del" onclick="handleDelete('${m.id}')">×</button>
    </div>
  `).join('');
}

function handleDelete(id) {
  if (navigator.vibrate) navigator.vibrate(10);
  deleteMeal(id); renderToday();
}

function renderHistory() {
  const data = getAllData();
  const today = todayKey();
  const keys = Object.keys(data).filter(k => k !== today).sort((a,b) => b.localeCompare(a));
  const container = document.getElementById('history-list');
  if (!keys.length) {
    container.innerHTML = '<div class="no-history">No history yet — keep logging! ✿</div>';
    return;
  }
  container.innerHTML = keys.map(key => {
    const meals = data[key];
    const total = meals.reduce((s,m) => s + m.calories, 0);
    const dateStr = new Date(key + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    return `<div class="history-day">
      <div class="history-day-header" onclick="toggleDay(this)">
        <div class="history-day-date">${dateStr}</div>
        <div class="history-day-right">
          <div class="history-day-total">${total.toLocaleString()} kcal</div>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="history-meals">
        ${meals.map(m => `<div class="history-meal-row">
          <span>${m.emoji||'🍽️'} ${m.name}</span>
          <span class="history-meal-cal">${m.calories.toLocaleString()}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleDay(header) {
  const meals = header.nextElementSibling;
  const chevron = header.querySelector('.chevron');
  meals.classList.toggle('open');
  chevron.classList.toggle('open');
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

function openSheet() {
  document.getElementById('sheet').classList.add('open');
  document.getElementById('meal-name').value = '';
  document.getElementById('meal-cals').value = '';
  setTimeout(() => document.getElementById('meal-name').focus(), 360);
}

function closeSheet() { document.getElementById('sheet').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('sheet')) closeSheet(); }
function setCals(n) { document.getElementById('meal-cals').value = n; }

function addMeal() {
  const name = document.getElementById('meal-name').value.trim();
  const cals = parseInt(document.getElementById('meal-cals').value);
  if (!name || isNaN(cals) || cals <= 0) return;
  const now = new Date();
  saveMeal({
    id: Date.now().toString(),
    name, calories: cals, emoji: selectedEmoji,
    time: now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'}),
  });
  if (navigator.vibrate) navigator.vibrate([8, 20, 8]);
  closeSheet(); renderToday();
}

function buildEmojiPicker() {
  document.getElementById('emoji-row').innerHTML = EMOJIS.map((e,i) =>
    `<div class="emoji-opt${i===0?' selected':''}" onclick="selectEmoji(this,'${e}')">${e}</div>`
  ).join('');
}

function selectEmoji(el, emoji) {
  document.querySelectorAll('.emoji-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedEmoji = emoji;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('sheet').classList.contains('open')) addMeal();
  if (e.key === 'Escape') closeSheet();
});

buildEmojiPicker();
renderToday();
</script>
</body>
</html>
